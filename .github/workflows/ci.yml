name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck (turbo)
        run: pnpm typecheck

      - name: Test (turbo)
        run: pnpm test

      - name: Eval suite (custom + OWASP-ASI)
        run: pnpm eval

      - name: Build microsite
        run: pnpm --filter @gsa/microsite build

      - name: Build agent
        run: pnpm --filter @gsa/agent build
